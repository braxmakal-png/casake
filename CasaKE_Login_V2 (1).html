<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CasaKE Luxury Login</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0d2f1d,#1B4D2E,#245c38);
}

body::before{
    content:'';
    position:absolute;
    inset:0;
    background:radial-gradient(circle at top right,rgba(212,175,55,.15),transparent 40%);
}

.login-container{
    position:relative;
    width:420px;
    background:rgba(255,255,255,0.97);
    padding:45px;
    border-radius:24px;
    border:2px solid #D4AF37;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.brand{
    text-align:center;
    margin-bottom:30px;
}

.brand h1{
    font-family:'Playfair Display',serif;
    color:#1B4D2E;
    font-size:42px;
}

.brand p{
    color:#666;
    margin-top:8px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid #d8d8d8;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#D4AF37;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#1B4D2E;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#D4AF37;
    color:#1B4D2E;
}

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    color:#1B4D2E;
    text-decoration:none;
    font-weight:500;
}

.links p{
    margin:8px 0;
}

.tagline{
    text-align:center;
    color:#D4AF37;
    letter-spacing:2px;
    font-size:12px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="login-container">

    <div class="tagline">PREMIUM HOME APPLIANCES</div>

    <div class="brand">
        <h1>CasaKE</h1>
        <p>Welcome back</p>
    </div>

    <form>
        <input type="email" placeholder="Email Address" required>
        <input type="password" placeholder="Password" required>

        <button type="submit">Sign In</button>
    </form>

    <div class="links">
        <p><a href="#">Forgot Password?</a></p>
        <p>New to CasaKE? <a href="#">Create Account</a></p>
    </div>

</div>

</body>
</html>
